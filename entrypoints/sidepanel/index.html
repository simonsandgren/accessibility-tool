<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessibility Audit Panel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1 data-i18n="panelTitle">Accessibility Audit Panel</h1>
      <button type="button" id="settings-toggle" aria-expanded="false"></button>
    </header>

    <main id="main-view">
      <fieldset>
        <legend data-i18n="exposureLegend">Exposure</legend>
        <label>
          <input type="checkbox" id="toggle-headings" />
          <span data-i18n="headingLevelsLabel">Heading levels</span>
        </label>
      </fieldset>
      <fieldset>
        <legend data-i18n="manipulationLegend">Manipulation</legend>
        <label>
          <input type="checkbox" id="toggle-css" />
          <span data-i18n="disableCssLabel">Disable page CSS</span>
        </label>
      </fieldset>
      <button type="button" id="refresh" data-i18n="refreshButton">Refresh</button>
      <p id="status" role="status"></p>
    </main>

    <section id="settings-view" hidden aria-labelledby="settings-heading">
      <h2 id="settings-heading" data-i18n="settingsLabel">Settings</h2>
      <label>
        <span data-i18n="languageLabel">Language</span>
        <select id="language-select">
          <option value="auto" data-i18n="languageAuto">Auto</option>
          <option value="en">English</option>
          <option value="sv">Svenska</option>
        </select>
      </label>

      <fieldset>
        <legend data-i18n="themeLabel">Theme</legend>
        <div class="theme-options">
          <label>
            <input type="radio" name="theme" value="system" />
            <span class="option-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><rect x="32" y="48" width="192" height="144" rx="16" transform="translate(256 240) rotate(180)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="160" y1="224" x2="96" y2="224" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="32" y1="152" x2="224" y2="152" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="128" y1="192" x2="128" y2="224" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
            </span>
            <span data-i18n="themeSystem">System</span>
          </label>
          <label>
            <input type="radio" name="theme" value="light" />
            <span class="option-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><line x1="128" y1="40" x2="128" y2="16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><circle cx="128" cy="128" r="56" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="64" y1="64" x2="48" y2="48" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="64" y1="192" x2="48" y2="208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="192" y1="64" x2="208" y2="48" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="192" y1="192" x2="208" y2="208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="40" y1="128" x2="16" y2="128" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="128" y1="216" x2="128" y2="240" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="216" y1="128" x2="240" y2="128" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
            </span>
            <span data-i18n="themeLight">Light</span>
          </label>
          <label>
            <input type="radio" name="theme" value="dark" />
            <span class="option-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M108.11,28.11A96.09,96.09,0,0,0,227.89,147.89,96,96,0,1,1,108.11,28.11Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
            </span>
            <span data-i18n="themeDark">Dark</span>
          </label>
        </div>
      </fieldset>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
