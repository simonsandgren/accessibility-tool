<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessibility Audit Panel</title>
  </head>
  <body>
    <main>
      <h1 data-i18n="panelTitle">Accessibility Audit Panel</h1>
      <fieldset>
        <legend data-i18n="exposureLegend">Exposure</legend>
        <label>
          <input type="checkbox" id="toggle-headings" />
          <span data-i18n="headingLevelsLabel">Heading levels</span>
        </label>
      </fieldset>
      <fieldset>
        <legend data-i18n="manipulationLegend">Manipulation</legend>
        <label>
          <input type="checkbox" id="toggle-css" />
          <span data-i18n="disableCssLabel">Disable page CSS</span>
        </label>
      </fieldset>
      <button type="button" id="refresh" data-i18n="refreshButton">Refresh</button>
      <p id="status" role="status"></p>

      <details>
        <summary data-i18n="settingsLabel">Settings</summary>
        <label>
          <span data-i18n="languageLabel">Language</span>
          <select id="language-select">
            <option value="auto" data-i18n="languageAuto">Auto</option>
            <option value="en">English</option>
            <option value="sv">Svenska</option>
          </select>
        </label>
      </details>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
